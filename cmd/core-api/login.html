<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Safe Road — Admin Authentication</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #090e14;
      --bg-gradient: radial-gradient(circle at 50% 50%, #152435 0%, #080d13 100%);
      --accent: #1d6f8a;
      --accent-2: #14b8a6;
      --glass: rgba(22, 36, 50, 0.5);
      --glass-border: rgba(255, 255, 255, 0.08);
      --shadow: 0 20px 50px rgba(0,0,0,0.3);
      --ink: #f1f5f9;
      --muted: #94a3b8;
      --bad: #ef4444;
      --safe: #10b981;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      background-image: var(--bg-gradient);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow: hidden;
    }

    /* Ambient background glows */
    .glow-1, .glow-2 {
      position: absolute; width: 300px; height: 300px; border-radius: 50%;
      filter: blur(120px); z-index: 1; opacity: 0.15; pointer-events: none;
    }
    .glow-1 { background: var(--accent); top: 20%; left: 25%; }
    .glow-2 { background: var(--accent-2); bottom: 20%; right: 25%; }

    .login-container {
      position: relative; z-index: 10; width: 100%; max-width: 420px;
      perspective: 1000px;
    }

    .login-card {
      background: var(--glass);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 28px;
      padding: 40px 32px;
      box-shadow: var(--shadow);
      text-align: center;
      transform: translateY(0);
      transition: transform 300ms ease, box-shadow 300ms ease;
    }
    .login-card:hover {
      box-shadow: 0 24px 60px rgba(0,0,0,0.4);
    }

    .brand-header {
      margin-bottom: 32px;
    }

    .logo-icon {
      font-size: 42px; margin-bottom: 12px; display: inline-block;
      filter: drop-shadow(0 4px 10px rgba(29,111,138,0.3));
    }

    .brand-title {
      font-size: 26px; font-weight: 800; letter-spacing: 0.05em;
      background: linear-gradient(135deg, #fff 30%, var(--muted) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 4px;
    }

    .brand-subtitle {
      font-size: 11px; font-weight: 800; color: var(--accent-2);
      text-transform: uppercase; letter-spacing: 0.2em;
    }

    .form-group {
      margin-bottom: 20px; text-align: left;
    }

    .form-group label {
      display: block; font-size: 11px; font-weight: 800; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px;
    }

    .input-wrapper {
      position: relative;
    }

    input {
      width: 100%; padding: 14px 16px; border-radius: 14px;
      background: rgba(8, 14, 20, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.06);
      color: var(--ink); font-family: inherit; font-size: 15px;
      transition: border-color 200ms ease, box-shadow 200ms ease, background 200ms ease;
      outline: none;
    }

    input:focus {
      border-color: var(--accent);
      background: rgba(8, 14, 20, 0.9);
      box-shadow: 0 0 0 4px rgba(29, 111, 138, 0.18);
    }

    button {
      width: 100%; padding: 14px; border: none; border-radius: 14px;
      background: linear-gradient(135deg, var(--accent), #15556a);
      color: #fff; font-family: inherit; font-size: 15px; font-weight: 700;
      cursor: pointer; position: relative; overflow: hidden;
      box-shadow: 0 8px 24px rgba(29, 111, 138, 0.25);
      transition: transform 150ms ease, box-shadow 200ms ease, filter 200ms ease;
    }

    button:hover {
      filter: brightness(1.1);
      box-shadow: 0 12px 28px rgba(29, 111, 138, 0.35);
    }

    button:active {
      transform: scale(0.98);
    }

    button:disabled {
      background: var(--muted); cursor: not-allowed; box-shadow: none; filter: none;
    }

    .footer-note {
      margin-top: 24px; font-size: 12px; color: var(--muted);
    }

    /* Toast system */
    .toast {
      position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(20px);
      padding: 12px 24px; border-radius: 14px; background: rgba(239, 68, 68, 0.9);
      color: #fff; font-size: 14px; font-weight: 600; box-shadow: 0 8px 30px rgba(0,0,0,0.3);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      opacity: 0; pointer-events: none; transition: opacity 250ms ease, transform 250ms ease;
      z-index: 100;
    }
    .toast.show {
      opacity: 1; transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>

  <div class="glow-1"></div>
  <div class="glow-2"></div>

  <div class="login-container">
    <main class="login-card">
      <div class="brand-header">
        <span class="logo-icon">🛡️</span>
        <h1 class="brand-title">SAFE ROAD</h1>
        <h2 class="brand-subtitle">Admin Gateway</h2>
      </div>

      <form id="login-form">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" value="admin" required autocomplete="username">
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password" autofocus>
        </div>

        <button type="submit" id="btn-login">Sign In</button>
      </form>

      <div class="footer-note">
        Protected by stateless HMAC secure sessions.
      </div>
    </main>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const form = document.getElementById('login-form');
    const btn = document.getElementById('btn-login');
    const toast = document.getElementById('toast');
    let toastTimer;

    function showToast(msg) {
      toast.textContent = msg;
      toast.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => { toast.classList.remove('show'); }, 3000);
    }

    form.addEventListener('submit', async e => {
      e.preventDefault();
      btn.disabled = true;
      btn.textContent = 'Authenticating...';

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      try {
        const res = await fetch('/v1/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.error || 'Authentication failed');
        }

        // Redirect to dashboard on successful login
        window.location.reload();
      } catch (err) {
        showToast(err.message);
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    });
  </script>
</body>
</html>
