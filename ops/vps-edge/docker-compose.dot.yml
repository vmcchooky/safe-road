services:
  dns-resolver:
    environment:
      SAFE_ROAD_DNS_DOT_ENABLED: "true"
      SAFE_ROAD_DNS_DOT_CERT_FILE: /run/safe-road/dot-certs/fullchain.pem
      SAFE_ROAD_DNS_DOT_KEY_FILE: /run/safe-road/dot-certs/privkey.pem
    ports:
      - "${SAFE_ROAD_DNS_DOT_PUBLISHED_PORT:-853}:${SAFE_ROAD_DNS_DOT_CONTAINER_PORT:-8533}"
    volumes:
      - "${SAFE_ROAD_DNS_DOT_CERTS_DIR:-./ops/certs/dot}:/run/safe-road/dot-certs:ro"
